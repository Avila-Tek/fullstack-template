name: Renovate
on:
  # Permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:
  # Se ejecuta automáticamente todos los días a las 3:00 AM (puedes ajustar el cron)
  schedule:
    - cron: '0 3 * * *'

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v40.3.6
        with:
          # El archivo de configuración que creamos en la raíz
          configurationFile: renovate.json
          # El secret que generaste con el PAT (Fine-grained token)
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          # Esto ayuda a que el bot sepa en qué repositorio está trabajando
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # Forzamos a que use el log en modo info para ver qué está haciendo
          LOG_LEVEL: info
