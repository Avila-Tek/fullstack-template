services:
  # ============================================================================
  # API Application with Alloy
  # ============================================================================
  api:
    # platform: linux/amd64  # Use linux/arm64 for Apple Silicon
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
      args:
        APP_PATH: apps/api
        PORT: 4000
    ports:
      - "4000:4000"
    environment:
      # Application
      PORT: 4000
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-["*"]}
      HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-here}
      POSTMARK_API_KEY: ${POSTMARK_API_KEY:-your-postmark-key}
      SENTRY_DSN: ${SENTRY_DSN:-}
      
      # Alloy - Application Info
      APP_NAME: restful-mongoose-api
      ENVIRONMENT: ${ENVIRONMENT:-development}
      HOSTNAME: ${HOSTNAME:-api-container}
      CLUSTER_NAME: ${CLUSTER_NAME:-local-dev}
      APP_PORT: 4000
      
      # Alloy - Grafana Cloud Loki Configuration
      # Get these from: https://grafana.com/docs/grafana-cloud/send-data/logs/logs-loki/
      LOKI_URL: ${LOKI_URL}
      LOKI_USERNAME: ${LOKI_USERNAME}
      LOKI_PASSWORD: ${LOKI_PASSWORD}
      
      # Alloy - Grafana Cloud Prometheus Configuration
      # Get these from: https://grafana.com/docs/grafana-cloud/send-data/metrics/metrics-prometheus/
      PROMETHEUS_REMOTE_WRITE_URL: ${PROMETHEUS_REMOTE_WRITE_URL}
      PROMETHEUS_USERNAME: ${PROMETHEUS_USERNAME}
      PROMETHEUS_PASSWORD: ${PROMETHEUS_PASSWORD}
      
      # Database - MongoDB
      DATABASE: ${DATABASE:-mongodb://mongo:27017/restful-mongoose}
      
      # Feature Flags (Optional - leave empty to disable)
      FEATURE_FLAG_PROVIDER: ${FEATURE_FLAG_PROVIDER:-}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-}
      GROWTHBOOK_API_KEY: ${GROWTHBOOK_API_KEY:-}
      GROWTHBOOK_API_HOST: ${GROWTHBOOK_API_HOST:-}
    depends_on:
      - mongo
    restart: unless-stopped

  # ============================================================================
  # MongoDB Database
  # ============================================================================
  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-restful-mongoose}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
